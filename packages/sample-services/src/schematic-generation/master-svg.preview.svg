  <text x="80" y="768" class="label" fill="#666" font-size="9">• KEY0..KEY9 use MCU internal pull-ups; each switch shorts the pin to GND when pressed.</text>
  <text x="80" y="782" class="label" fill="#666" font-size="9">• KEY0 (voice) doubles as the deep-sleep wake source.</text>
