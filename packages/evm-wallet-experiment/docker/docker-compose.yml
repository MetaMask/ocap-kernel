services:
  evm:
    build:
      context: ../../../
      dockerfile: packages/evm-wallet-experiment/docker/Dockerfile.evm
    networks: [ocap-e2e]
    ports: ['8545:8545']
    volumes:
      - ocap-run:/run/ocap
      - ocap-logs:/logs
    healthcheck:
      test: ['CMD', 'test', '-f', '/run/ocap/contracts.json']
      interval: 3s
      timeout: 5s
      retries: 30

  bundler:
    # Multi-arch index digest — refresh: docker buildx imagetools inspect ghcr.io/pimlicolabs/alto:latest
    image: ghcr.io/pimlicolabs/alto@sha256:8420c602c1b4618d4e244e693f8d4cfd28fc86fd5808b74fdd185730f934e29e
    networks: [ocap-e2e]
    ports: ['4337:4337']
    volumes:
      - ocap-run:/run/ocap
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for contracts..."
        while [ ! -f /run/ocap/contracts.json ]; do sleep 1; done
        ENTRYPOINT=$$(node -e "console.log(JSON.parse(require('fs').readFileSync('/run/ocap/contracts.json','utf8')).EntryPoint)")
        echo "EntryPoint: $$ENTRYPOINT"
        exec npm start -- \
          --port 4337 \
          --rpc-url http://evm:8545 \
          --entrypoints "$$ENTRYPOINT" \
          --executor-private-keys "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d" \
          --utility-private-key "0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6" \
          --safe-mode false \
          --balance-override true
    depends_on:
      evm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch("http://localhost:4337",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jsonrpc:"2.0",id:1,method:"eth_supportedEntryPoints",params:[]})}).then(async(r)=>{if(!r.ok)return process.exit(1);const j=await r.json();process.exit(!j.error&&Array.isArray(j.result)&&j.result.length>0?0:1)}).catch(()=>process.exit(1))
      interval: 3s
      timeout: 5s
      retries: 20

  ollama:
    profiles: [ollama]
    image: ollama/ollama
    networks: [ocap-e2e]
    volumes:
      - ollama-models:/root/.ollama
      - ocap-logs:/logs
      - ./entrypoint-llm.sh:/entrypoint-llm.sh:ro
    entrypoint: ['/bin/sh', '/entrypoint-llm.sh']
    healthcheck:
      test: ['CMD', 'test', '-f', '/tmp/llm-ready']
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 300s

  # Three home/away pairs so DELEGATION_MODE suites can run in parallel (shared evm + bundler).
  kernel-home-bundler-7702:
    build:
      context: ../../../
      dockerfile: packages/evm-wallet-experiment/docker/Dockerfile.kernel-base
      target: kernel
    environment:
      - SERVICE_NAME=kernel-home-bundler-7702
      - HOME=/run/ocap/kernel-home-bundler-7702
      - SOCKET_PATH=/run/ocap/kernel-home-bundler-7702/.ocap/daemon.sock
      - QUIC_LISTEN_ADDRESS=/ip4/0.0.0.0/udp/4011/quic-v1
      - READY_FILE=/run/ocap/kernel-home-bundler-7702-ready.json
    networks: [ocap-e2e]
    ports: ['4011:4011/udp']
    volumes:
      - ocap-run:/run/ocap
      - ocap-logs:/logs
    entrypoint:
      - node
      - '--conditions'
      - development
      - /app/packages/evm-wallet-experiment/docker/entrypoint-kernel.mjs
    depends_on:
      evm:
        condition: service_healthy
      bundler:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'test', '-f', '/run/ocap/kernel-home-bundler-7702-ready.json']
      interval: 3s
      timeout: 5s
      retries: 60
      start_period: 30s

  kernel-away-bundler-7702:
    build:
      context: ../../../
      dockerfile: packages/evm-wallet-experiment/docker/Dockerfile.kernel-base
      target: kernel
    environment:
      - SERVICE_NAME=kernel-away-bundler-7702
      - HOME=/run/ocap/kernel-away-bundler-7702
      - SOCKET_PATH=/run/ocap/kernel-away-bundler-7702/.ocap/daemon.sock
      - QUIC_LISTEN_ADDRESS=/ip4/0.0.0.0/udp/4012/quic-v1
      - READY_FILE=/run/ocap/kernel-away-bundler-7702-ready.json
    networks: [ocap-e2e]
    ports: ['4012:4012/udp']
    volumes:
      - ocap-run:/run/ocap
      - ocap-logs:/logs
    entrypoint:
      - node
      - '--conditions'
      - development
      - /app/packages/evm-wallet-experiment/docker/entrypoint-kernel.mjs
    depends_on:
      evm:
        condition: service_healthy
      bundler:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'test', '-f', '/run/ocap/kernel-away-bundler-7702-ready.json']
